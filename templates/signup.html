<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="color-scheme" content="light">
  <title>Request Access — VM Builder</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <style>
    :root {
      --pico-font-size: 95%;
      --pico-border-radius: 1rem;
      --auth-ink: #0f172a;
      --auth-muted: #64748b;
      --auth-border: rgba(148, 163, 184, 0.22);
      --auth-accent: #2563eb;
      --auth-min-height: 100vh;
    }
    @supports (min-height: 100dvh) {
      :root {
        --auth-min-height: 100dvh;
      }
    }
    html,
    body {
      overflow: hidden;
      touch-action: none;
      height: 100%;
      width: 100%;
    }
    body {
      min-height: var(--auth-min-height);
      margin: 0;
      display: grid;
      place-items: center;
      padding: 0;
      background:
        radial-gradient(circle at top left, rgba(59, 130, 246, 0.09), transparent 28%),
        radial-gradient(circle at bottom right, rgba(16, 185, 129, 0.06), transparent 26%),
        #f1f5f9;
    }
    .auth-page {
      width: 100%;
      display: grid;
      place-items: center;
      padding: 1rem;
    }
    .auth-shell {
      width: min(34rem, calc(100vw - 2rem));
      border: 1px solid var(--auth-border);
      border-radius: 1.7rem;
      background:
        linear-gradient(180deg, rgba(248, 250, 252, 0.96), rgba(255, 255, 255, 1) 28%);
      box-shadow:
        0 24px 60px rgba(15, 23, 42, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.75);
      padding: 2.15rem;
    }
    .auth-panel {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 1.35rem;
      margin: 0;
    }
    .auth-hero {
      display: grid;
      gap: 0.75rem;
    }
    .auth-brand {
      display: flex;
      align-items: center;
      gap: 0.95rem;
    }
    .auth-mark {
      width: 3.5rem;
      height: 3.5rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 1.1rem;
      background:
        linear-gradient(145deg, rgba(37, 99, 235, 0.14), rgba(14, 165, 233, 0.10));
      color: var(--auth-accent);
      border: 1px solid rgba(37, 99, 235, 0.18);
      font-size: 1.45rem;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
    }
    .auth-title {
      margin: 0;
      color: var(--auth-ink);
      font-size: 2rem;
      line-height: 1.05;
    }
    .auth-subtitle {
      margin: 0;
      color: #475569;
      max-width: 26rem;
    }
    .auth-form-shell {
      padding: 0;
      border: none;
      border-radius: 1.2rem;
      background: transparent;
      box-shadow: none;
    }
    .auth-form-head {
      margin-bottom: 1.15rem;
    }
    .auth-form-head h2 {
      margin-bottom: 0.2rem;
      color: var(--auth-ink);
    }
    .auth-form-head p {
      display: none;
    }
    .input-icon {
      position: relative;
      margin-bottom: 1rem;
    }
    .input-icon i {
      position: absolute;
      left: 0.95rem;
      top: 0;
      bottom: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1rem;
      line-height: 1;
      color: #64748b;
      z-index: 1;
      pointer-events: none;
    }
    .input-icon input {
      padding-left: 2.7rem;
      margin-bottom: 0;
      border-color: rgba(148, 163, 184, 0.28);
      background: #fff;
    }
    .auth-panel article {
      margin-bottom: 1rem;
    }
    .auth-links {
      text-align: center;
      margin-top: 1rem;
      color: #94a3b8;
    }
    .me-1 {
      margin-right: 0.35rem;
    }
    .muted {
      color: var(--auth-muted);
    }
    @media (max-width: 576px) {
      body {
        place-items: start center;
      }
      .auth-shell input,
      .auth-shell button,
      .auth-shell select,
      .auth-shell textarea {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
<main class="auth-page">
  <div class="auth-shell">
    <section class="auth-panel">
      <div class="auth-hero">
        <div class="auth-brand">
          <span class="auth-mark"><i class="bi bi-hdd-rack"></i></span>
          <div>
            <h1 class="auth-title">VM Builder</h1>
          </div>
        </div>
        <p class="auth-subtitle">Create a pending account for admin approval.</p>
      </div>

      <div class="auth-form-shell">
        <div class="auth-form-head">
          <div>
            <h2>Sign up</h2>
          </div>
        </div>

        {% if success %}
        <article>
          <i class="bi bi-check-circle me-1"></i>Your request has been submitted. An admin will review it shortly.
        </article>
        <a href="/login" role="button"><i class="bi bi-arrow-left me-1"></i>Back to login</a>
        {% else %}
          {% if error %}
          <article>
            <i class="bi bi-exclamation-triangle me-1"></i>{{ error }}
          </article>
          {% endif %}

          <form method="post" action="/signup">
            <label for="username">Username</label>
            <div class="input-icon">
              <i class="bi bi-person"></i>
              <input type="text" id="username" name="username" autocomplete="username" autofocus required>
            </div>

            <label for="password">Password</label>
            <div class="input-icon">
              <i class="bi bi-key"></i>
              <input type="password" id="password" name="password" autocomplete="new-password" required minlength="8">
            </div>
            <small>Minimum 8 characters.</small>

            <label for="confirm">Confirm password</label>
            <div class="input-icon">
              <i class="bi bi-shield-lock"></i>
              <input type="password" id="confirm" name="confirm" autocomplete="new-password" required>
            </div>

            <button type="submit"><i class="bi bi-send me-1"></i>Submit request</button>
          </form>
        {% endif %}

        <p class="auth-links">
          Already have an account? <a href="/login">Sign in</a>
        </p>
      </div>
    </section>
  </div>
</main>
</body>
</html>
