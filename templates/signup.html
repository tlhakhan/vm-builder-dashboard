<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>Request Access — VM Builder</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <style>
    :root {
      --pico-font-size: 95%;
      --pico-border-radius: 1rem;
    }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top left, rgba(59, 130, 246, 0.09), transparent 28%),
        radial-gradient(circle at bottom right, rgba(16, 185, 129, 0.06), transparent 26%),
        #f1f5f9;
    }
    .auth-shell {
      width: min(34rem, calc(100vw - 2rem));
      border: 1px solid rgba(148, 163, 184, 0.22);
      border-radius: 1.5rem;
      background: #ffffff;
      box-shadow: 0 16px 48px rgba(15, 23, 42, 0.10);
    }
    .auth-panel {
      padding: 2rem;
    }
    .input-icon {
      position: relative;
      margin-bottom: 1rem;
    }
    .input-icon i {
      position: absolute;
      left: 0.95rem;
      top: 0;
      bottom: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1rem;
      line-height: 1;
      color: #64748b;
      z-index: 1;
      pointer-events: none;
    }
    .input-icon input {
      padding-left: 2.7rem;
      margin-bottom: 0;
      border-color: rgba(148, 163, 184, 0.28);
      background: #fff;
    }
    .me-1 {
      margin-right: 0.35rem;
    }
    .muted {
      color: #64748b;
    }
  </style>
</head>
<body>
<main class="auth-shell">
  <section class="auth-panel">
    <div style="margin-bottom:1.25rem;">
      <h2 style="margin-bottom:0.25rem;">Request access</h2>
      <p style="margin-bottom:0; color:#94a3b8;">Create a pending account for admin approval.</p>
    </div>

    {% if success %}
    <article>
      <i class="bi bi-check-circle me-1"></i>Your request has been submitted. An admin will review it shortly.
    </article>
    <a href="/login" role="button"><i class="bi bi-arrow-left me-1"></i>Back to login</a>
    {% else %}
      {% if error %}
      <article>
        <i class="bi bi-exclamation-triangle me-1"></i>{{ error }}
      </article>
      {% endif %}

      <form method="post" action="/signup">
        <label for="username">Username</label>
        <div class="input-icon">
          <i class="bi bi-person"></i>
          <input type="text" id="username" name="username" autocomplete="username" autofocus required>
        </div>

        <label for="password">Password</label>
        <div class="input-icon">
          <i class="bi bi-key"></i>
          <input type="password" id="password" name="password" autocomplete="new-password" required minlength="8">
        </div>
        <small>Minimum 8 characters.</small>

        <label for="confirm">Confirm password</label>
        <div class="input-icon">
          <i class="bi bi-shield-lock"></i>
          <input type="password" id="confirm" name="confirm" autocomplete="new-password" required>
        </div>

        <button type="submit"><i class="bi bi-send me-1"></i>Submit request</button>
      </form>
    {% endif %}

    <p style="text-align:center; margin-top:1.2rem; color:#94a3b8;">
      Already have an account? <a href="/login">Sign in</a>
    </p>
  </section>
</main>
</body>
</html>
